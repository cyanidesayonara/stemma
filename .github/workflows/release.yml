name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Sync version from tag
        shell: pwsh
        run: .\scripts\sync_release_version.ps1 -Tag "${{ github.ref_name }}"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run fast tests
        run: pytest -m "not slow and not hardware" -v --tb=short --timeout=120

      - name: Build executable
        run: pyinstaller stemma.spec

      - name: Verify build
        shell: pwsh
        run: |
          if (!(Test-Path "dist/stemma/stemma.exe")) {
            throw "Build failed: stemma.exe not found in dist/stemma/"
          }
          $size = (Get-Item "dist/stemma/stemma.exe").Length / 1MB
          Write-Output "stemma.exe size: $([math]::Round($size, 1)) MB"
          $files = (Get-ChildItem "dist/stemma" -Recurse).Count
          Write-Output "Total files in bundle: $files"

      - name: Create zip archive
        shell: pwsh
        run: Compress-Archive -Path "dist/stemma/*" -DestinationPath "dist/stemma.zip"

      - name: Build MSIX package
        shell: pwsh
        run: .\scripts\build_msix.ps1 -Output "dist/stemma.msix"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/stemma.zip
            dist/stemma.msix
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
